name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -race -count=1

      - name: Format check
        run: |
          if [ -n "$(gofmt -s -l .)" ]; then
            echo "Files not formatted:"
            gofmt -s -l .
            exit 1
          fi

      - name: Build
        run: CGO_ENABLED=0 go build -o ./agent2shell ./cmd/agent2shell/
